<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Panama Nation profile page" />
  <title>Profile | Panama Nation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="/" aria-label="Panama Nation home">
        <span class="brand-mark">PN</span>
        <span class="brand-text">
          <strong>Panama Nation</strong>
          <small>Profile</small>
        </span>
      </a>

      <nav class="nav-links" aria-label="Primary">
        <a href="/#blog">Blog</a>
        <a href="/#shops">Live shops</a>
        <a href="/#map">Dynmap</a>
      </nav>

      <div class="auth-slot">
        <a class="btn btn-secondary" href="/logout">Logout</a>
      </div>
    </div>
  </header>

  <main>
    <section class="profile-hero card">
      <div class="profile-summary">
        <p class="eyebrow">Authenticated account</p>
        <h1 id="profile-name">Loading profile...</h1>
        <p id="profile-handle" class="lead"></p>
        <div class="hero-actions">
          <a class="btn btn-primary" href="/">Back to home</a>
          <a class="btn btn-secondary" href="/logout">Logout</a>
        </div>
      </div>

      <div class="profile-avatar-card">
        <img id="profile-avatar" alt="" />
        <div class="profile-meta">
          <span>Discord user</span>
          <strong id="profile-discord-id"></strong>
        </div>
      </div>
    </section>

    <section class="section-grid profile-grid">
      <article class="card">
        <div class="card-head">
          <p class="eyebrow">Nation access</p>
          <h2>Discord role check</h2>
        </div>
        <div id="nation-role" class="status-card">Loading role data…</div>
      </article>

      <article class="card">
        <div class="card-head">
          <p class="eyebrow">Server roles</p>
          <h2>Roles from your guild</h2>
        </div>
        <div id="role-list" class="role-list"></div>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="profile.js"></script>
</body>
</html>
